<!DOCTYPE html>
<html lang="fr"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChantierPro v5 — Suivi de Chantier</title>
<link href="./Suivi chantier site_files/css2" rel="stylesheet">
<style>
:root {
  --ink: #1a1a1a; --ink2: #4a4a4a; --ink3: #8a8a8a;
  --paper: #f8f6f1; --paper2: #eeebe3; --paper3: #e3dfd5;
  --accent: #c85a2a; --accent2: #e87a4a;
  --green: #2a6b3a; --green-bg: #e8f4ec;
  --blue: #1e4a8a; --blue-bg: #e8eef8;
  --orange: #b85a00; --orange-bg: #fdf0e0;
  --red: #8a1a1a; --red-bg: #faeaea;
  --grey-bg: #f0ede6;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
  --radius: 8px; --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

/* ── LOGIN SCREEN ── */
#loginScreen {
  position: fixed; inset: 0; background: var(--paper); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
.login-card {
  background: #fff; border-radius: 18px; padding: 2.5rem;
  width: 400px; max-width: calc(100vw - 2rem);
  box-shadow: 0 24px 60px rgba(0,0,0,0.14);
  border: 1px solid var(--paper3);
}
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
.login-logo-dot { width: 10px; height: 10px; background: var(--accent2); border-radius: 50%; }
.login-logo-text { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--ink); }
.login-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: var(--ink3); margin-bottom: 1.75rem; }
.login-label { font-size: 12px; font-weight: 600; color: var(--ink2); display: block; margin-bottom: 6px; }
.login-input {
  width: 100%; padding: 10px 13px; border: 1.5px solid var(--paper3);
  border-radius: 9px; font-size: 14px; font-family: 'DM Sans', sans-serif;
  margin-bottom: 1rem; transition: border 0.15s; background: #fff; color: var(--ink);
}
.login-input:focus { outline: none; border-color: var(--accent2); }
.login-error { font-size: 12px; color: var(--red); min-height: 18px; margin-bottom: 0.75rem; }
.login-btn {
  width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none;
  border-radius: 9px; font-size: 14px; font-family: 'DM Sans', sans-serif;
  font-weight: 600; cursor: pointer; transition: background 0.15s;
}
.login-btn:hover { background: var(--accent2); }
.login-btn:disabled { opacity: 0.6; cursor: default; }

/* ── HEADER ── */
.header { background: var(--ink); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: #fff; letter-spacing: 0.08em; display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 8px; height: 8px; background: var(--accent2); border-radius: 50%; }
.header-right { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.header-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #ccc; font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.header-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
.header-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.user-badge { font-size: 11px; color: #888; font-family: 'DM Mono', monospace; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── LAYOUT ── */
.layout { display: flex; min-height: calc(100vh - 56px); }
.sidebar { width: 260px; flex-shrink: 0; background: var(--paper2); border-right: 1px solid var(--paper3); padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 0.4rem; overflow-y: auto; }
.sidebar-title { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--ink3); text-transform: uppercase; padding: 0 0.5rem; margin-bottom: 0.2rem; margin-top: 0.75rem; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent; }
.nav-item:hover { background: var(--paper3); }
.nav-item.active { background: var(--ink); color: #fff; }
.nav-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.ni-dash { background: #e8e8e8; } .ni-report { background: #ede8f8; }
.pi-go { background: #fdebd0; } .pi-apt { background: #d5e8f8; }
.nav-item.active .nav-icon { opacity: 0.85; }
.nav-info { flex: 1; min-width: 0; }
.nav-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-meta { font-size: 11px; color: var(--ink3); margin-top: 1px; }
.progress-mini { width: 34px; height: 4px; background: rgba(0,0,0,0.1); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.progress-mini-fill { height: 100%; background: var(--accent2); border-radius: 2px; transition: width 0.3s; }
.nav-item.active .progress-mini { background: rgba(255,255,255,0.2); }
.nav-actions { display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.1s; }
.nav-item:hover .nav-actions, .nav-item.active .nav-actions { opacity: 1; }
.icon-btn { background: none; border: none; cursor: pointer; color: #888; font-size: 13px; padding: 2px 4px; border-radius: 4px; transition: all 0.1s; line-height: 1; }
.nav-item.active .icon-btn { color: #aaa; }
.icon-btn.rename:hover { color: #4a90e2 !important; background: rgba(74,144,226,0.15); }
.icon-btn.dup:hover { color: #2a9d5c !important; background: rgba(42,157,92,0.15); }
.icon-btn.del:hover { color: #ff5555 !important; background: rgba(255,85,85,0.15); }
.add-btn { margin-top: 0.5rem; display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: var(--radius); border: 1.5px dashed var(--paper3); background: none; cursor: pointer; color: var(--ink3); font-size: 12px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; width: 100%; }
.add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--orange-bg); }

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; }

/* ── CARDS ── */
.card { background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--paper3); box-shadow: var(--shadow); }

/* ── DASHBOARD ── */
.dashboard { padding: 2rem; max-width: 1100px; }
.page-title { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--ink3); margin-bottom: 1.75rem; }
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.85rem; margin-bottom: 1.75rem; }
.kpi-card { background: #fff; border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; border: 1px solid var(--paper3); box-shadow: var(--shadow); }
.kpi-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
.kpi-value { font-size: 28px; font-weight: 600; font-family: 'DM Mono', monospace; }
.kpi-value.green { color: var(--green); } .kpi-value.orange { color: var(--orange); } .kpi-value.red { color: var(--red); } .kpi-value.blue { color: var(--blue); }
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.proj-card { background: #fff; border-radius: var(--radius-lg); padding: 1.4rem; border: 1px solid var(--paper3); box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s; }
.proj-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--accent2); }
.proj-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
.proj-card-icon { width: 42px; height: 42px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.proj-card-name { font-size: 14px; font-weight: 600; }
.proj-card-type { font-size: 11px; color: var(--ink3); margin-top: 2px; }
.prog-bar { height: 6px; background: var(--paper3); border-radius: 3px; margin: 0.6rem 0 0.4rem; overflow: hidden; }
.prog-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s; }
.prog-label { font-size: 12px; color: var(--ink3); display: flex; justify-content: space-between; }
.proj-card-statuses { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.status-pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.sp-done { background: var(--green-bg); color: var(--green); }
.sp-can { background: var(--blue-bg); color: var(--blue); }
.sp-prog { background: var(--orange-bg); color: var(--orange); }
.sp-blocked { background: var(--red-bg); color: var(--red); }

/* ── RAPPORT ── */
.rapport { padding: 2rem; max-width: 1100px; }
.rapport-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
.rapport-full { margin-bottom: 1.25rem; }
.rcard { background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--paper3); box-shadow: var(--shadow); padding: 1.4rem; }
.rcard-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 1rem; }
.pie-wrap { display: flex; align-items: center; gap: 2rem; }
.pie-container { position: relative; width: 140px; height: 140px; flex-shrink: 0; }
.pie-container canvas { width: 140px !important; height: 140px !important; }
.pie-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
.pie-pct { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--ink); }
.pie-pct-label { font-size: 10px; color: var(--ink3); }
.pie-legend { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-label { flex: 1; color: var(--ink2); }
.legend-val { font-weight: 600; font-family: 'DM Mono', monospace; color: var(--ink); }
.alert-list { display: flex; flex-direction: column; gap: 8px; }
.alert-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: var(--radius); border: 1px solid; }
.alert-item.alert-red { background: var(--red-bg); border-color: #f5c0c0; }
.alert-item.alert-orange { background: var(--orange-bg); border-color: #f5d9b0; }
.alert-item.alert-blue { background: var(--blue-bg); border-color: #b8ccee; }
.alert-item.alert-green { background: var(--green-bg); border-color: #aad4b4; }
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.alert-content { flex: 1; }
.alert-title { font-size: 13px; font-weight: 600; }
.alert-sub { font-size: 11px; color: var(--ink3); margin-top: 2px; }
.next-table { width: 100%; border-collapse: collapse; }
.next-table th { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); padding: 0 10px 8px; text-align: left; border-bottom: 1px solid var(--paper3); }
.next-table td { font-size: 13px; padding: 9px 10px; border-bottom: 1px solid var(--paper3); vertical-align: middle; }
.next-table tr:last-child td { border-bottom: none; }
.next-table tr:hover td { background: var(--grey-bg); }
.tbl-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
.notes-list { display: flex; flex-direction: column; gap: 8px; }
.note-card { padding: 10px 14px; border-radius: var(--radius); background: var(--paper2); border-left: 3px solid var(--accent2); }
.note-card-meta { font-size: 11px; color: var(--ink3); margin-bottom: 4px; }
.note-card-text { font-size: 13px; color: var(--ink2); font-style: italic; }
.chantier-bar-item { margin-bottom: 14px; }
.chantier-bar-item:last-child { margin-bottom: 0; }
.chantier-bar-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
.chantier-bar-name { font-size: 13px; font-weight: 500; }
.chantier-bar-val { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--ink3); }
.chantier-bar-bg { height: 8px; background: var(--paper3); border-radius: 4px; overflow: hidden; }
.chantier-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
.activity-list { display: flex; flex-direction: column; gap: 6px; }
.activity-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius); background: var(--paper); border: 1px solid var(--paper3); }
.activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.activity-content { flex: 1; min-width: 0; }
.activity-step { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.activity-project { font-size: 11px; color: var(--ink3); margin-top: 1px; }
.activity-date { font-size: 11px; color: var(--ink3); font-family: 'DM Mono', monospace; white-space: nowrap; flex-shrink: 0; }

/* ── CHECKLIST ── */
.checklist-view { padding: 2rem; max-width: 860px; }
.checklist-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; }
.checklist-title-group { flex: 1; }
.checklist-type { font-size: 11px; color: var(--ink3); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.checklist-title { font-size: 22px; font-weight: 600; }
.checklist-header-btns { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.back-btn { background: none; border: 1px solid var(--paper3); color: var(--ink2); font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.back-btn:hover { background: var(--paper2); }

/* FILTER TABS */
.filter-bar { display: flex; gap: 4px; margin-bottom: 1rem; flex-wrap: wrap; }
.ftab { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; border: 1.5px solid var(--paper3); background: #fff; color: var(--ink2); transition: all 0.15s; font-weight: 500; }
.ftab:hover { border-color: var(--accent2); color: var(--accent); }
.ftab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.ftab-count { display: inline-block; background: rgba(0,0,0,0.12); border-radius: 10px; font-size: 10px; padding: 1px 6px; margin-left: 4px; font-weight: 600; }
.ftab.active .ftab-count { background: rgba(255,255,255,0.2); }
.filter-empty { text-align: center; padding: 3rem 1rem; color: var(--ink3); font-size: 13px; }

.progress-overview { background: #fff; border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; border: 1px solid var(--paper3); box-shadow: var(--shadow); margin-bottom: 1.5rem; }
.progress-overview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-overview-label { font-size: 13px; font-weight: 500; }
.progress-overview-value { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }
.progress-bar-main { height: 8px; background: var(--paper3); border-radius: 4px; overflow: hidden; }
.progress-bar-main-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

.project-notes-card { background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--paper3); box-shadow: var(--shadow); margin-bottom: 1rem; overflow: hidden; }
.project-notes-header { display: flex; align-items: center; gap: 8px; padding: 0.9rem 1.25rem; cursor: pointer; transition: background 0.15s; }
.project-notes-header:hover { background: var(--grey-bg); }
.project-notes-title { font-size: 12px; font-weight: 600; color: var(--ink2); flex: 1; }
.project-notes-chevron { color: var(--ink3); font-size: 12px; transition: transform 0.2s; }
.project-notes-card.open .project-notes-chevron { transform: rotate(180deg); }
.project-notes-body { display: none; padding: 0 1.25rem 1.25rem; }
.project-notes-card.open .project-notes-body { display: block; }
.project-notes-textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--paper3); border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--ink2); background: var(--paper); resize: vertical; min-height: 80px; transition: border 0.15s; }
.project-notes-textarea:focus { outline: none; border-color: var(--accent2); }

.step-block { background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--paper3); box-shadow: var(--shadow); margin-bottom: 1rem; overflow: hidden; }
.step-header { display: flex; align-items: center; gap: 12px; padding: 1rem 1.25rem; cursor: pointer; transition: background 0.15s; }
.step-header:hover { background: var(--grey-bg); }
.step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; flex-shrink: 0; background: var(--paper2); color: var(--ink2); }
.step-num.done { background: var(--green); color: #fff; }
.step-num.can { background: var(--blue); color: #fff; }
.step-num.inprogress { background: var(--orange); color: #fff; }
.step-info { flex: 1; min-width: 0; }
.step-name { font-size: 14px; font-weight: 500; }
.step-remark { font-size: 11px; color: var(--ink3); font-style: italic; margin-top: 2px; }
.step-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.badge-done { background: var(--green-bg); color: var(--green); }
.badge-can { background: var(--blue-bg); color: var(--blue); }
.badge-blocked { background: var(--red-bg); color: var(--red); }
.badge-progress { background: var(--orange-bg); color: var(--orange); }
.step-chevron { color: var(--ink3); font-size: 12px; flex-shrink: 0; transition: transform 0.2s; }
.step-block.open .step-chevron { transform: rotate(180deg); }
.prereqs { border-top: 1px solid var(--paper3); padding: 0.75rem 1.25rem 1rem; display: none; background: #fdfcf9; }
.step-block.open .prereqs { display: block; }
.prereq-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--paper3); }
.prereq-item:last-child { border-bottom: none; }
.prereq-check { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--paper3); background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-top: 1px; transition: all 0.15s; font-size: 11px; }
.prereq-check.checked { background: var(--green); border-color: var(--green); color: #fff; }
.prereq-text { font-size: 13px; color: var(--ink2); line-height: 1.4; flex: 1; cursor: pointer; }
.prereq-text.checked { color: var(--ink3); text-decoration: line-through; }
.note-input { width: 100%; margin-top: 10px; padding: 8px 10px; border: 1px solid var(--paper3); border-radius: 6px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--ink2); background: #fff; resize: none; transition: border 0.15s; }
.note-input:focus { outline: none; border-color: var(--accent2); }
.note-label { font-size: 11px; color: var(--ink3); margin-top: 10px; margin-bottom: 4px; display: block; }
.step-date { font-size: 11px; font-family: 'DM Mono', monospace; margin-top: 8px; padding: 4px 0; }
.step-date.done-date { color: var(--green); }
.step-date.started-date { color: var(--orange); }
.step-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; flex-wrap: wrap; }
.step-btn { padding: 6px 16px; border-radius: 6px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; font-weight: 500; transition: all 0.15s; }
.step-btn-green { background: var(--green); color: #fff; } .step-btn-green:hover { opacity: 0.85; }
.step-btn-blue { background: var(--blue); color: #fff; } .step-btn-blue:hover { opacity: 0.85; }
.step-btn-grey { background: var(--paper3); color: var(--ink2); } .step-btn-grey:hover { background: var(--paper2); }

/* ── BUDGET ── */
.deblocage-badge { display:inline-flex;align-items:center;gap:4px;background:#fffbf0;border:1px solid #f0d070;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;color:#8a6500;margin-left:6px;vertical-align:middle; }
.deblocage-total-bar { background:#fff;border-radius:var(--radius-lg);border:1px solid var(--paper3);box-shadow:var(--shadow);padding:1.1rem 1.5rem;margin-bottom:1.25rem; }
.dtb-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px; }
.dtb-title { font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3); }
.dtb-val { font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:var(--green); }
.dtb-max { font-size:12px;color:var(--ink3); }
.dtb-bar-track { height:12px;background:var(--paper3);border-radius:6px;overflow:hidden;display:flex; }
.dtb-segment { height:100%;transition:width 0.5s; }

let _currentUid  = null;
let _fbListener  = null;

function getFbPath() { return 'chantierPro/users/' + _currentUid + '/data'; }

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPassword').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginError');
  if(!email || !pw) { err.textContent = 'Veuillez remplir tous les champs.'; return; }
  btn.disabled = true; btn.textContent = 'Connexion…'; err.textContent = '';
  try {
    await window._fbSignIn(email, pw);
    // onAuthStateChanged handles the rest
  } catch(e) {
    const msgs = {
      'auth/invalid-credential':  'E-mail ou mot de passe incorrect.',
      'auth/user-not-found':       'Aucun compte avec cet e-mail.',
      'auth/wrong-password':       'Mot de passe incorrect.',
      'auth/too-many-requests':    'Trop de tentatives. Réessayez plus tard.',
      'auth/network-request-failed': 'Erreur réseau. Vérifiez votre connexion.',
    };
    err.textContent = msgs[e.code] || 'Erreur : ' + e.message;
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
}

async function doLogout() {
  if(_fbListener) { window._fbOff(getFbPath()); _fbListener = null; }
  await window._fbSignOut();
}

function showLoginScreen() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'Se connecter';
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginPassword').value = '';
  setTimeout(()=>document.getElementById('loginEmail').focus(), 100);
}

function hideLoginScreen(user) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('userBadge').textContent = user.email;
}

// ══════════════════════════════════════════
//  STATE + FIREBASE SYNC
// ══════════════════════════════════════════
let state = { projects:[], currentView:'dashboard', currentProjectId:null };
let _isSyncing = false;
let _filter = 'all';
let _noteDebounce = null;
let _projectNotesOpen = false;

function setSyncStatus(s) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if(!dot) return;
  dot.className = 'sync-dot ' + s;
  lbl.textContent = s==='synced' ? '● Synchronisé' : s==='syncing' ? '⟳ Sauvegarde…' : '✗ Hors ligne';
}

function saveNow() { pushToFirebase(); showToast('💾 Sauvegardé'); }

function pushToFirebase() {
  if(!window._fbSet || !_currentUid) { setSyncStatus('offline'); return; }
  setSyncStatus('syncing');
  window._fbSet(getFbPath(), { projects: state.projects, updatedAt: Date.now() })
    .then(()=> setSyncStatus('synced'))
    .catch(()=> setSyncStatus('offline'));
}

function startFirebaseListener() {
  window._fbListen(getFbPath(), (data) => {
    if(!data) { setSyncStatus('synced'); render(); return; }
    _isSyncing = true;
    state.projects = (data.projects || []).map(migrateProject);
    setSyncStatus('synced');
    render();
    setTimeout(()=>{ _isSyncing = false; }, 100);
  });
}

function migrateProject(p) {
  if(!p.notes) p.notes = '';
  if(p.steps) p.steps = p.steps.map(s => {
    if(s.doneAt === undefined)    s.doneAt    = null;
    if(s.startedAt === undefined) s.startedAt = null;
    return s;
  });
  return p;
}

function exportData() {
  const b = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download=`ChantierPro_${new Date().toISOString().slice(0,10)}.json`; a.click();
  showToast('⬇ Données exportées');
}
function importData(e) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try { const d=JSON.parse(ev.target.result); state.projects=(d.projects||[]).map(migrateProject); pushToFirebase(); render(); showToast('⬆ Données importées'); }
    catch { showToast('❌ Fichier invalide'); }
  };
  r.readAsText(f); e.target.value='';
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function createProject(name,type) {
  const tmpl=TEMPLATES[type];
  return { id:Date.now(), name, type, notes:'', createdAt:new Date().toISOString(),
    steps:tmpl.steps.map(s=>({ id:s.id, checked:new Array(s.prereqs.length).fill(false), note:'', open:false, done:false, inprogress:false, doneAt:null, startedAt:null })) };
}
function getProject(id)   { return state.projects.find(p=>p.id===id); }
function getProgress(p)   { const done=p.steps.filter(s=>s.done).length; return {done,total:p.steps.length,pct:Math.round(done/p.steps.length*100)}; }
function getStepStatus(p,i) {
  const s=p.steps[i];
  if(s.done) return 'done';
  if(s.inprogress) return 'inprogress';
  if(s.checked.length===0) return 'can';
  return s.checked.filter(Boolean).length < s.checked.length ? 'blocked' : 'can';
}
function statusLabel(st) { return {done:'✓ Terminé',can:'Peut démarrer',blocked:'Ne peut pas démarrer',inprogress:'En cours'}[st]; }
function statusBadge(st) { return {done:'badge-done',can:'badge-can',blocked:'badge-blocked',inprogress:'badge-progress'}[st]; }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(iso) { if(!iso) return ''; return new Date(iso).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}); }
function formatDateShort(iso) { if(!iso) return ''; return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}); }

function drawPie(canvasId,segments,total) {
  const canvas=document.getElementById(canvasId); if(!canvas) return;
  const ctx=canvas.getContext('2d'); const cx=70,cy=70,r=60,inner=38;
  ctx.clearRect(0,0,140,140);
  if(!total){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#e3dfd5';ctx.fill();ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();return;}
  let angle=-Math.PI/2;
  segments.forEach(s=>{if(!s.val)return;const sl=(s.val/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+sl);ctx.closePath();ctx.fillStyle=s.color;ctx.fill();angle+=sl;});
  ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
}

function renderChecklist(pid) {
  const p=getProject(pid); if(!p){showDashboard();return;}
  const tmpl=TEMPLATES[p.type]; const prog=getProgress(p);
  const counts={all:tmpl.steps.length,can:0,inprogress:0,blocked:0,done:0};
  tmpl.steps.forEach((_,i)=>{counts[getStepStatus(p,i)]++;});
  const filterTabs=[{key:'all',label:'Tous'},{key:'can',label:'Peut démarrer'},{key:'inprogress',label:'En cours'},{key:'blocked',label:'Bloqué'},{key:'done',label:'Terminé'}]
    .map(t=>`<button class="ftab ${_filter===t.key?'active':''}" onclick="setFilter('${t.key}',${pid})">${t.label}<span class="ftab-count">${counts[t.key]}</span></button>`).join('');
  const allSteps=tmpl.steps.map((ts,idx)=>({ts,idx,ps:p.steps[idx],st:getStepStatus(p,idx)}));
  const shown=_filter==='all'?allSteps:allSteps.filter(x=>x.st===_filter);
  const stepsHtml=shown.length===0?`<div class="filter-empty">Aucune étape dans cette catégorie.</div>`
    :shown.map(({ts,idx,ps,st})=>{
      const numCls=st==='done'?'done':st==='can'?'can':st==='inprogress'?'inprogress':'';
      const prereqsHtml=ts.prereqs.map((pt,pi)=>`<div class="prereq-item"><div class="prereq-check ${ps.checked[pi]?'checked':''}" onclick="togglePrereq(${pid},${idx},${pi})">${ps.checked[pi]?'✓':''}</div><div class="prereq-text ${ps.checked[pi]?'checked':''}" onclick="togglePrereq(${pid},${idx},${pi})">${escHtml(pt)}</div></div>`).join('');
      const btns=st==='done'?`<button class="step-btn step-btn-grey" onclick="markUndone(${pid},${idx})">↩ Rouvrir</button>`
        :st==='inprogress'?`<button class="step-btn step-btn-grey" onclick="markUndone(${pid},${idx})">↩ Rouvrir</button><button class="step-btn step-btn-green" onclick="markDone(${pid},${idx})">✓ Marquer terminé</button>`
        :st==='can'?`<button class="step-btn step-btn-blue" onclick="markInProgress(${pid},${idx})">▶ Démarrer</button>`:'';
      const dateHtml=ps.doneAt?`<div class="step-date done-date">✓ Terminé le ${formatDate(ps.doneAt)}</div>`:ps.startedAt?`<div class="step-date started-date">▶ Démarré le ${formatDate(ps.startedAt)}</div>`:'';
      return `<div class="step-block ${ps.open?'open':''}" id="sb_${pid}_${idx}">
        <div class="step-header" onclick="toggleStep(${pid},${idx})">
          <div class="step-num ${numCls}">${ts.id}</div>
          <div class="step-info"><div class="step-name">${escHtml(ts.name)}${ts.deblocage>0?`<span class="deblocage-badge">💰 ${ts.deblocage}%</span>`:''}</div>${ts.remark?`<div class="step-remark">${escHtml(ts.remark)}${ts.phase?` <span class="phase-tag phase-${ts.phase==='parachèvement'?'para':ts.phase}">${ts.phase}</span>`:''}</div>`:''}</div>
          <div class="step-badge ${statusBadge(st)}">${statusLabel(st)}</div>
          <div class="step-chevron">▼</div>
        </div>
        <div class="prereqs">${prereqsHtml}${dateHtml}
          <span class="note-label">📝 Remarque / note de visite</span>
          <textarea class="note-input" rows="2" placeholder="Ajouter une note..." oninput="updateNote(${pid},${idx},this.value)">${escHtml(ps.note||'')}</textarea>
          <div class="step-actions">${btns}</div>
        </div>
      </div>`;
    }).join('');
  const tot=tmpl.steps.reduce((a,s)=>a+(s.deblocage||0),0);
  let uGo=0,uCC=0,uPa=0;
  tmpl.steps.forEach((ts,i)=>{if(p.steps[i].done&&ts.deblocage){if(ts.phase==='go')uGo+=ts.deblocage;else if(ts.phase==='couvert')uCC+=ts.deblocage;else uPa+=ts.deblocage;}});
  const uTot=uGo+uCC+uPa;
  const budgetHtml=tot>0?`<div class="deblocage-total-bar"><div class="dtb-header"><span class="dtb-title">💰 Budget débloqué</span><div><span class="dtb-val">${uTot.toFixed(1)}%</span> <span class="dtb-max">/ ${tot.toFixed(1)}% budget total chantier</span></div></div><div class="dtb-bar-track"><div class="dtb-segment" style="width:${uGo/tot*100}%;background:#e87a4a"></div><div class="dtb-segment" style="width:${uCC/tot*100}%;background:#1e4a8a"></div><div class="dtb-segment" style="width:${uPa/tot*100}%;background:#2a6b3a"></div></div><div class="dtb-legend"><div class="dtb-leg"><div class="dtb-leg-dot" style="background:#e87a4a"></div>GO : ${uGo.toFixed(1)}% / 40%</div><div class="dtb-leg"><div class="dtb-leg-dot" style="background:#1e4a8a"></div>Clos couvert : ${uCC.toFixed(1)}% / 21.5%</div><div class="dtb-leg"><div class="dtb-leg-dot" style="background:#2a6b3a"></div>Parachèvement : ${uPa.toFixed(1)}% / 38.5%</div></div></div>`:'';
  const pnOpen=_projectNotesOpen?'open':'';
  document.getElementById('mainContent').innerHTML=`<div class="checklist-view">
    <div class="checklist-header">
      <div class="checklist-title-group"><div class="checklist-type">${tmpl.icon} ${tmpl.label}</div><div class="checklist-title">${escHtml(p.name)}</div></div>
      <div class="checklist-header-btns">
        <button class="back-btn" onclick="openRenameModal(${pid})">✏ Renommer</button>
        <button class="back-btn" onclick="showRapport()">📈 Rapport</button>
        <button class="back-btn" onclick="showDashboard()">← Tableau de bord</button>
      </div>
    </div>
    <div class="progress-overview">
      <div class="progress-overview-header"><span class="progress-overview-label">Avancement global</span><span class="progress-overview-value">${prog.done} / ${prog.total} étapes terminées (${prog.pct}%)</span></div>
      <div class="progress-bar-main"><div class="progress-bar-main-fill" style="width:${prog.pct}%"></div></div>
    </div>
    ${budgetHtml}
    <div class="project-notes-card ${pnOpen}" id="projectNotesCard">
      <div class="project-notes-header" onclick="toggleProjectNotes()">
        <span style="font-size:14px">📋</span>
        <span class="project-notes-title">Notes de chantier${p.notes&&p.notes.trim()?' ●':''}</span>
        <span class="project-notes-chevron">▼</span>
      </div>
      <div class="project-notes-body">
        <textarea class="project-notes-textarea" placeholder="Notes générales (contacts, observations…)" oninput="updateProjectNotes(${pid},this.value)">${escHtml(p.notes||'')}</textarea>
      </div>
    </div>
    <div class="filter-bar">${filterTabs}</div>
    ${stepsHtml}
  </div>`;
}

// ══════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════
function showDashboard() { state.currentView='dashboard'; state.currentProjectId=null; _filter='all'; render(); }
function showRapport()   { state.currentView='rapport';   state.currentProjectId=null; render(); }
function showProject(id) { state.currentView='project';   state.currentProjectId=id;  _filter='all'; render(); }
function toggleStep(pid,idx) { const p=getProject(pid); p.steps[idx].open=!p.steps[idx].open; renderChecklist(pid); }
function togglePrereq(pid,si,pi) { const p=getProject(pid); p.steps[si].checked[pi]=!p.steps[si].checked[pi]; autoSave(); render(); }
function updateNote(pid,si,v) { const p=getProject(pid); p.steps[si].note=v; clearTimeout(_noteDebounce); _noteDebounce=setTimeout(()=>autoSave(),1500); }
function updateProjectNotes(pid,v) { const p=getProject(pid); p.notes=v; clearTimeout(_noteDebounce); _noteDebounce=setTimeout(()=>autoSave(),1500); }
function toggleProjectNotes() { _projectNotesOpen=!_projectNotesOpen; const c=document.getElementById('projectNotesCard'); if(c) c.classList.toggle('open',_projectNotesOpen); }
function setFilter(f,pid) { _filter=f; renderChecklist(pid); }
function markInProgress(pid,si) { const p=getProject(pid); p.steps[si].inprogress=true; p.steps[si].done=false; p.steps[si].open=true; if(!p.steps[si].startedAt) p.steps[si].startedAt=new Date().toISOString(); autoSave(); render(); showToast('▶ Étape démarrée'); }
function markDone(pid,si) { const p=getProject(pid); p.steps[si].done=true; p.steps[si].inprogress=false; p.steps[si].checked=p.steps[si].checked.map(()=>true); p.steps[si].open=false; p.steps[si].doneAt=new Date().toISOString(); if(!p.steps[si].startedAt) p.steps[si].startedAt=p.steps[si].doneAt; autoSave(); render(); showToast('✓ Étape terminée'); }
function markUndone(pid,si) { const p=getProject(pid); p.steps[si].done=false; p.steps[si].inprogress=false; p.steps[si].checked=p.steps[si].checked.map(()=>false); p.steps[si].open=true; p.steps[si].doneAt=null; p.steps[si].startedAt=null; autoSave(); render(); showToast('↩ Étape réouverte'); }
function autoSave() { if(!_isSyncing) pushToFirebase(); }
function openAddModal()  { document.getElementById('newProjectName').value=''; document.getElementById('addModal').classList.add('open'); setTimeout(()=>document.getElementById('newProjectName').focus(),100); }
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }
function addProject()    { const name=document.getElementById('newProjectName').value.trim(); const type=document.getElementById('newProjectType').value; if(!name) return; state.projects.push(createProject(name,type)); closeAddModal(); autoSave(); render(); showToast('🏗 Chantier créé'); }
function openRenameModal(pid) { const p=getProject(pid); document.getElementById('renameProjectId').value=pid; document.getElementById('renameProjectName').value=p.name; document.getElementById('renameModal').classList.add('open'); setTimeout(()=>{const el=document.getElementById('renameProjectName');el.select();},100); }
function closeRenameModal() { document.getElementById('renameModal').classList.remove('open'); }
function confirmRename() { const pid=+document.getElementById('renameProjectId').value; const name=document.getElementById('renameProjectName').value.trim(); if(!name) return; getProject(pid).name=name; closeRenameModal(); autoSave(); render(); showToast('✏ Renommé'); }
function duplicateProject(pid) { const p=getProject(pid); state.projects.push(createProject(p.name+' (copie)',p.type)); autoSave(); render(); showToast('⧉ Dupliqué'); }
function deleteProject(pid) { if(!confirm('Supprimer ce chantier ?')) return; state.projects=state.projects.filter(p=>p.id!==pid); if(state.currentProjectId===pid){state.currentView='dashboard';state.currentProjectId=null;} autoSave(); render(); showToast('🗑 Supprimé'); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function render() { renderSidebar(); if(state.currentView==='dashboard') renderDashboard(); else if(state.currentView==='rapport') renderRapport(); else if(state.currentView==='project') renderChecklist(state.currentProjectId); }

// Modal backdrop + keyboard
document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeAddModal();});
document.getElementById('renameModal').addEventListener('click',function(e){if(e.target===this)closeRenameModal();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeAddModal();closeRenameModal();}
  if(e.key==='Enter'){
    if(document.getElementById('loginScreen').style.display!=='none') doLogin();
    else if(document.getElementById('addModal').classList.contains('open')) addProject();
    else if(document.getElementById('renameModal').classList.contains('open')) confirmRename();
  }
});
document.getElementById('loginPassword').addEventListener('keydown',e=>{if(e.key==='Enter') doLogin();});

// ══════════════════════════════════════════
//  BOOT — wait for Firebase Auth
// ══════════════════════════════════════════
document.addEventListener('firebaseReady', () => {
  window._fbOnAuth(user => {
    if(user) {
      _currentUid = user.uid;
      hideLoginScreen(user);
      setSyncStatus('syncing');
      state = { projects:[], currentView:'dashboard', currentProjectId:null };
      render();
      startFirebaseListener();
    } else {
      _currentUid = null;
      state = { projects:[], currentView:'dashboard', currentProjectId:null };
      showLoginScreen();
    }
  });
});
</script>
</body></html>
